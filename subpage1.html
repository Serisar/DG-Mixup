<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shuffled Throws</title>

  <!-- Include Material Design Lite CSS -->
  <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
  <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>

  <!-- Google Fonts for icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <style>
    .page-content {
      padding: 16px;
    }
    .entry-list {
      margin-top: 20px;
    }
    .entry-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #E0E0E0;
      border-radius: 5px;
      transition: background-color 0.3s;
      font-weight: bold;
    }
    .edit-icon, .delete-icon {
      cursor: pointer;
      color: #3F51B5;
    }
    .circle-number {
      display: inline-block;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: #3F51B5;
      color: white;
      text-align: center;
      line-height: 30px;
      margin-right: 10px;
      font-weight: bold;
    }
    .shuffled-number {
      background-color: #FFC107; /* Different color for shuffled number */
    }
    .hidden {
      display: none;
    }
    .icon-button {
      position: absolute;
      top: 16px;
      left: 16px;
    }
    .greyed-out {
      background-color: #E0E0E0;
      color: #9E9E9E;
    }
    .arrow {
      margin-left: 10px;
      margin-right: 10px;
    }
    .align-right {
      margin-left: auto;
    }
  </style>
</head>
<body>

  <!-- Header with Return to Homepage (House Icon) -->
  <header class="mdl-layout__header">
    <div class="mdl-layout__header-row">
      <div class="icon-button">
        <a href="index.html" class="mdl-button mdl-js-button mdl-button--icon">
          <i class="material-icons">home</i>
        </a>
      </div>
      <span class="mdl-layout-title">Shuffled Throws</span>
    </div>
  </header>

  <!-- Page content -->
  <main class="mdl-layout__content">
    <div class="page-content">
      <h4>Enter a name</h4>

      <!-- Text input field and Add button -->
      <div id="input-section">
        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
          <input class="mdl-textfield__input" type="text" id="entryInput">
          <label class="mdl-textfield__label" for="entryInput">Enter a string...</label>
        </div>
        <button id="addEntry" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">
          Add
        </button>
      </div>

      <!-- List of entries -->
      <div class="entry-list" id="entryList"></div>

      <!-- Confirm button -->
      <button id="confirmEntries" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent">
        Confirm all entries
      </button>

      <!-- Shuffle button (hidden initially) -->
      <button id="shuffleEntries" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored hidden">
        Shuffle
      </button>

      <!-- Reset button (hidden initially) -->
      <button id="resetEntries" class="mdl-button mdl-js-button mdl-button--raised hidden">
        Reset to Edit
      </button>

      <!-- Shuffle history (no longer needed for individual cards) -->
    </div>
  </main>

  <script>
    let entries = [];
    let excludedIndices = new Set(); // To track excluded entries
    let userColors = {}; // Store colors for users to keep them consistent
    const entryInput = document.getElementById('entryInput');
    const entryList = document.getElementById('entryList');
    const confirmButton = document.getElementById('confirmEntries');
    const shuffleButton = document.getElementById('shuffleEntries');
    const resetButton = document.getElementById('resetEntries');

    const colors = [
      '#F44336', '#E91E63', '#9C27B0', '#673AB7', '#3F51B5',
      '#2196F3', '#03A9F4', '#00BCD4', '#009688', '#4CAF50'
    ];

    // Function to assign a random color from the color list
    function assignRandomColor(entry) {
      let randomColor = colors[Math.floor(Math.random() * colors.length)];
      while (Object.values(userColors).includes(randomColor)) {
        randomColor = colors[Math.floor(Math.random() * colors.length)]; // Ensure uniqueness of color
      }
      userColors[entry] = randomColor;
    }

    // Function to check if a name is valid (alphanumeric and non-empty)
    function isValidName(value) {
      return /^[a-zA-Z0-9]+$/.test(value.trim());
    }

    // Add entry function
    document.getElementById('addEntry').addEventListener('click', addEntry);
    entryInput.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        addEntry();
      }
    });

    function addEntry() {
      const value = entryInput.value.trim();
      if (value && isValidName(value)) {
        entries.push(value);
        if (!userColors[value]) {
          assignRandomColor(value); // Assign random color to new entry
        }
        displayEntries();
        entryInput.value = '';  // Clear the input field after entry
      }
    }

    // Function to display the entries in the list
    function displayEntries() {
      entryList.innerHTML = '';  // Clear the existing list
      entries.forEach((entry, index) => {
        const entryItem = document.createElement('div');
        entryItem.className = 'entry-item';
        entryItem.setAttribute('data-index', index); // Set index for later use in shuffling

        const entryNumber = document.createElement('div');
        entryNumber.className = 'circle-number';
        entryNumber.innerText = index + 1;
        entryNumber.style.backgroundColor = userColors[entry]; // Use assigned color

        const entryText = document.createElement('span');
        entryText.innerText = entry;
        entryText.style.color = 'black'; // Ensure readability

        const editButton = document.createElement('i');
        editButton.className = 'material-icons edit-icon';
        editButton.innerText = 'edit';
        editButton.addEventListener('click', function () {
          editEntry(index);
        });

        const deleteButton = document.createElement('i');
        deleteButton.className = 'material-icons delete-icon';
        deleteButton.innerText = 'delete';
        deleteButton.addEventListener('click', function () {
          deleteEntry(index);
        });

        const shuffledNumber = document.createElement('div');
        shuffledNumber.className = 'circle-number shuffled-number hidden'; // Initially hidden
        shuffledNumber.innerText = '?'; // Placeholder before shuffling
        shuffledNumber.style.backgroundColor = userColors[entry]; // Use the same color as original

        const rightIcons = document.createElement('div');
        rightIcons.className = 'align-right';
        rightIcons.appendChild(shuffledNumber); // Attach shuffled number to the right side
        rightIcons.appendChild(editButton);
        rightIcons.appendChild(deleteButton);

        entryItem.appendChild(entryNumber);
        entryItem.appendChild(entryText);
        entryItem.appendChild(rightIcons);
        entryList.appendChild(entryItem);
      });
    }

    // Confirm button: Show shuffle/reset buttons and enable shuffling
    confirmButton.addEventListener('click', () => {
      shuffleButton.classList.remove('hidden');
      resetButton.classList.remove('hidden');
      confirmButton.classList.add('hidden');
      disableEditIcons(); // Hide edit and delete icons when shuffling begins
    });

    // Shuffle function
    shuffleButton.addEventListener('click', shuffleEntries);

    function shuffleEntries() {
      let shuffledEntries = [...entries];

      // Remove excluded entries
      shuffledEntries = shuffledEntries.filter((_, index) => !excludedIndices.has(index));

      // Shuffle the remaining entries
      for (let i = shuffledEntries.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledEntries[i], shuffledEntries[j]] = [shuffledEntries[j], shuffledEntries[i]];
      }

      // Display shuffled results in the right place (aligned to each user card)
      entries.forEach((entry, index) => {
        const entryItem = document.querySelector(`.entry-item[data-index="${index}"]`);
        const shuffledNumber = entryItem.querySelector('.shuffled-number');

        if (excludedIndices.has(index)) {
          shuffledNumber.classList.add('hidden'); // Hide for excluded users
        } else {
          shuffledNumber.classList.remove('hidden');
          shuffledNumber.innerText = shuffledEntries.indexOf(entry) + 1; // Display shuffled number
        }
      });
    }

    // Function to toggle exclusion
    entryList.addEventListener('click', (event) => {
      const entryItem = event.target.closest('.entry-item');
      if (entryItem) {
        const index = parseInt(entryItem.getAttribute('data-index'), 10);
        if (excludedIndices.has(index)) {
          excludedIndices.delete(index); // Re-include in shuffle
          entryItem.classList.remove('greyed-out');
        } else {
          excludedIndices.add(index); // Exclude from shuffle
          entryItem.classList.add('greyed-out');
        }
      }
    });

    // Reset to edit mode
    resetButton.addEventListener('click', () => {
      shuffleButton.classList.add('hidden');
      resetButton.classList.add('hidden');
      confirmButton.classList.remove('hidden');
      excludedIndices.clear();
      enableEditIcons(); // Show edit and delete icons again
    });

    // Edit entry function
    function editEntry(index) {
      const newName = prompt('Edit name:', entries[index]);
      if (newName && isValidName(newName)) {
        entries[index] = newName;
        displayEntries();
      }
    }

    // Delete entry function
    function deleteEntry(index) {
      entries.splice(index, 1);
      displayEntries();
    }

    // Hide edit icons
    function disableEditIcons() {
      const editIcons = document.querySelectorAll('.edit-icon, .delete-icon');
      editIcons.forEach(icon => icon.classList.add('hidden'));
    }

    // Show edit icons
    function enableEditIcons() {
      const editIcons = document.querySelectorAll('.edit-icon, .delete-icon');
      editIcons.forEach(icon => icon.classList.remove('hidden'));
    }
  </script>

</body>
</html>
