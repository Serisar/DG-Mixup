<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shuffled Throws</title>

  <!-- Include Material Design Lite CSS -->
  <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
  <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>

  <!-- Google Fonts for icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <style>
    .page-content {
      padding: 16px;
    }
    .entry-list {
      margin-top: 20px;
    }
    .entry-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #E0E0E0;
      border-radius: 5px;
      transition: background-color 0.3s;
      font-weight: bold;
      position: relative;
    }
    .edit-icon, .delete-icon {
      cursor: pointer;
      color: #3F51B5;
    }
    .circle-number {
      display: inline-block;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: #3F51B5;
      color: white;
      text-align: center;
      line-height: 30px;
      margin-right: 10px;
      font-weight: bold;
    }
    .shuffled-number {
      background-color: #FFC107; /* Different color for shuffled number */
    }
    .hidden {
      display: none;
    }
    .icon-button {
      position: absolute;
      top: 16px;
      left: 16px;
    }
    .greyed-out {
      background-color: #E0E0E0;
      color: #9E9E9E;
    }
    .arrow {
      margin-left: 10px;
      margin-right: 10px;
    }
    .action-icons {
      display: flex;
      gap: 10px;
      position: absolute;
      right: 10px;
    }
  </style>
</head>
<body>

  <!-- Header with Return to Homepage (House Icon) -->
  <header class="mdl-layout__header">
    <div class="mdl-layout__header-row">
      <div class="icon-button">
        <a href="index.html" class="mdl-button mdl-js-button mdl-button--icon">
          <i class="material-icons">home</i>
        </a>
      </div>
      <span class="mdl-layout-title">Shuffled Throws</span>
    </div>
  </header>

  <!-- Page content -->
  <main class="mdl-layout__content">
    <div class="page-content">
      <h4>Enter a name</h4>

      <!-- Text input field and Add button -->
      <div id="input-section">
        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
          <input class="mdl-textfield__input" type="text" id="entryInput">
          <label class="mdl-textfield__label" for="entryInput">Enter a string...</label>
        </div>
        <button id="addEntry" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored">
          Add
        </button>
      </div>

      <!-- List of entries -->
      <div class="entry-list" id="entryList"></div>

      <!-- Confirm button -->
      <button id="confirmEntries" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent">
        Confirm all entries
      </button>

      <!-- Shuffle button (hidden initially) -->
      <button id="shuffleEntries" class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored hidden">
        Shuffle
      </button>

      <!-- Reset button (hidden initially) -->
      <button id="resetEntries" class="mdl-button mdl-js-button mdl-button--raised hidden">
        Reset
      </button>

      <!-- Shuffle history container -->
      <div id="shuffle-history" class="shuffle-history"></div>

    </div>
  </main>

  <script>
    let entries = [];
    let excludedIndices = new Set(); // To track excluded entries
    let colorsAssigned = {}; // Store assigned colors for each user
    let shuffleHistory = []; // Store the last 5 shuffles

    const entryInput = document.getElementById('entryInput');
    const entryList = document.getElementById('entryList');
    const confirmButton = document.getElementById('confirmEntries');
    const shuffleButton = document.getElementById('shuffleEntries');
    const resetButton = document.getElementById('resetEntries');

    const colors = [
      '#F44336', // Red
      '#E91E63', // Pink
      '#9C27B0', // Purple
      '#673AB7', // Deep Purple
      '#3F51B5', // Indigo
      '#2196F3', // Blue
      '#03A9F4', // Light Blue
      '#00BCD4', // Cyan
      '#009688', // Teal
      '#4CAF50'  // Green
    ];

    // Function to add a new entry
    document.getElementById('addEntry').addEventListener('click', addEntry);
    entryInput.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        addEntry();
      }
    });

    function addEntry() {
      const value = entryInput.value.trim();
      if (value && /^[a-zA-Z0-9\s]+$/.test(value)) {
        entries.push(value);
        displayEntries();
        entryInput.value = '';  // Clear the input field after entry
      } else {
        alert("Please enter a valid alphanumeric string.");
      }
    }

    // Function to display the entries in the list
    function displayEntries() {
      entryList.innerHTML = '';  // Clear the existing list
      const usedColors = new Set(); // To keep track of used colors for number circles

      entries.forEach((entry, index) => {
        const entryItem = document.createElement('div');
        entryItem.className = 'entry-item';

        const entryNumber = document.createElement('div');
        entryNumber.className = 'circle-number';

        // Assign persistent color for the user if not already assigned
        if (!colorsAssigned[index]) {
          let colorIndex;
          do {
            colorIndex = Math.floor(Math.random() * colors.length);
          } while (usedColors.has(colorIndex) && usedColors.size < colors.length);
          colorsAssigned[index] = colors[colorIndex];
          usedColors.add(colorIndex);
        }
        entryNumber.style.backgroundColor = colorsAssigned[index]; // Use assigned color
        entryNumber.innerText = index + 1;
        entryItem.appendChild(entryNumber);

        const entryText = document.createElement('span');
        entryText.innerText = entry;
        entryText.style.color = 'black';

        const actionIcons = document.createElement('div');
        actionIcons.className = 'action-icons';

        const editButton = document.createElement('i');
        editButton.className = 'material-icons edit-icon';
        editButton.innerText = 'edit';
        editButton.addEventListener('click', function() {
          editEntry(index);
        });

        const deleteButton = document.createElement('i');
        deleteButton.className = 'material-icons delete-icon';
        deleteButton.innerText = 'delete';
        deleteButton.addEventListener('click', function() {
          deleteEntry(index);
        });

        actionIcons.appendChild(editButton);
        actionIcons.appendChild(deleteButton);

        entryItem.appendChild(entryText);
        entryItem.appendChild(actionIcons);
        entryList.appendChild(entryItem);
      });
    }

    // Confirm entries and prepare for shuffling
    confirmButton.addEventListener('click', function() {
      document.getElementById('input-section').classList.add('hidden');  // Hide the input section
      confirmButton.classList.add('hidden');  // Hide the confirm button
      shuffleButton.classList.remove('hidden');  // Show the shuffle button
      resetButton.classList.remove('hidden');  // Show reset button
      displayEntries();  // Re-render without edit/delete buttons
    });

    // Shuffle the entries and assign random numbers to them
    shuffleButton.addEventListener('click', function() {
      const availableIndices = [...Array(entries.length).keys()].filter(i => !excludedIndices.has(i));
      const shuffledNumbers = shuffleArray(availableIndices.map(x => x + 1));  // Shuffle only non-excluded entries

      const entryItems = document.querySelectorAll('.entry-item');
      entryItems.forEach((item, index) => {
        const existingShuffled = item.querySelector('.shuffled-number');
        if (existingShuffled) {
          existingShuffled.remove();
        }

        if (!excludedIndices.has(index)) {
          const shuffledNumber = document.createElement('div');
          shuffledNumber.className = 'circle-number shuffled-number';
          shuffledNumber.innerText = shuffledNumbers.shift();  // Assign shuffled number
          shuffledNumber.style.backgroundColor = colorsAssigned[index];  // Use the same color
          shuffledNumber.style.color = 'black';

          item.appendChild(shuffledNumber);  // Add shuffled number to the right of user card
        }
      });

      updateShuffleHistory();  // Update history
    });

    // Reset the entries to allow editing again
    resetButton.addEventListener('click', function() {
      document.getElementById('input-section').classList.remove('hidden');  // Show the input section
      confirmButton.classList.remove('hidden');  // Show the confirm button
      shuffleButton.classList.add('hidden');  // Hide the shuffle button
      resetButton.classList.add('hidden');  // Hide reset button
      displayEntries();  // Show entries with edit/delete buttons
    });

    // Edit an entry
    function editEntry(index) {
      const newEntry = prompt("Edit the entry:", entries[index]);
      if (newEntry && /^[a-zA-Z0-9\s]+$/.test(newEntry.trim())) {
        entries[index] = newEntry.trim();
        displayEntries();
      } else {
        alert("Please enter a valid alphanumeric string.");
      }
    }

    // Delete an entry
    function deleteEntry(index) {
      entries.splice(index, 1);
      displayEntries();
    }

    // Shuffle array helper function
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // Handle exclusion toggle
    entryList.addEventListener('click', function(event) {
      const target = event.target.closest('.entry-item');
      if (!target) return;

      const index = [...entryList.children].indexOf(target);
      if (excludedIndices.has(index)) {
        excludedIndices.delete(index);
        target.classList.remove('greyed-out');
      } else {
        excludedIndices.add(index);
        target.classList.add('greyed-out');
      }
    });

    // Update shuffle history, limit to last 5 shuffles
    function updateShuffleHistory() {
      const shuffleContainer = document.getElementById('shuffle-history');
      const shuffleItems = shuffleContainer.children;

      if (shuffleItems.length > 5) {
        shuffleContainer.removeChild(shuffleItems[0]);  // Remove oldest shuffle
      }
    }
  </script>

</body>
</html>
